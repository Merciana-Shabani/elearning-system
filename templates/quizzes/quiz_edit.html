{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Edit quiz — {{ quiz.name }}{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-2">
        <div>
            <h2 class="fw-bold mb-0"><i class="bi bi-pencil-square me-2 text-primary"></i>Edit quiz</h2>
            <p class="text-muted mb-0">{{ quiz.name }} · {{ quiz.course.fullname }}</p>
        </div>
        <div class="d-flex gap-2">
            <a href="{% url 'quizzes:detail' pk=quiz.pk %}" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i>Back to quiz
            </a>
            <a href="{% url 'courses:content' pk=quiz.course.pk %}" class="btn btn-outline-secondary">Course content</a>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
            <form method="post" novalidate>
                {% csrf_token %}
                {% crispy form %}
            </form>
        </div>
    </div>
</div>
{% endblock %}
