{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Upload Document — TPF Training Portal{% endblock %}

{% block content %}
<div class="container py-4" style="max-width: 820px;">
    <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-3">
        <div>
            <h3 class="mb-1" style="color:#0d2b4e;">Upload Document</h3>
            <div class="text-muted" style="font-size:.92rem;">Uploaded documents will appear in Normal Staff “Documents Library”.</div>
        </div>
        <a class="btn btn-outline-secondary" href="{% url 'courses:teaching' %}">
            <i class="bi bi-arrow-left me-1"></i>Back to Courses
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form|crispy }}
                <button class="btn btn-primary" type="submit">
                    <i class="bi bi-upload me-1"></i>Upload
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
