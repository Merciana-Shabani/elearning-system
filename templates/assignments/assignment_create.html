{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Create assignment — Elening LMS{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-2">
        <div>
            <h2 class="fw-bold mb-0"><i class="bi bi-pencil-square me-2 text-primary"></i>Create assignment</h2>
            <p class="text-muted mb-0">Add an assignment to your course and place it in a section.</p>
        </div>
        <a href="{% url 'courses:content' pk=view.course.pk %}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i>Back to course
        </a>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
            <form method="post" novalidate>
                {% csrf_token %}
                {% crispy form %}
            </form>
        </div>
    </div>
</div>
{% endblock %}
