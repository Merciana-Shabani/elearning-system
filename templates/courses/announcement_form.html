{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}{{ title }} — {{ course.shortname }}{% endblock %}

{% block content %}
<div class="container py-4">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="{% url 'courses:teaching' %}">My courses</a></li>
            <li class="breadcrumb-item"><a href="{% url 'courses:announcements_list' pk=course.pk %}">Announcements</a></li>
            <li class="breadcrumb-item active">{{ title }}</li>
        </ol>
    </nav>
    <h2 class="fw-bold mb-4">{{ title }}</h2>
    <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <button type="submit" class="btn btn-primary">Post</button>
        <a href="{% url 'courses:announcements_list' pk=course.pk %}" class="btn btn-outline-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
