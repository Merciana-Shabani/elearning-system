{% extends 'base.html' %}

{% block title %}{{ title }} — Elening LMS{% endblock %}

{% block content %}
<div class="dashboard-dark-wrap">
    <div class="container">
        <h2 class="page-title">{{ title }}</h2>
        <div class="card">
            <div class="card-body p-4">
                <form method="post" novalidate>
                    {% csrf_token %}
                    {{ form.media }}
                    {{ form.as_p }}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-outline-secondary">Save</button>
                        <a href="{% url 'courses:categories_manage' %}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
