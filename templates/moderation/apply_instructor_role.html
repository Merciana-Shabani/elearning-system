{% extends 'base.html' %}

{% block title %}Apply to be an Instructor — Elening LMS{% endblock %}

{% block content %}
<div class="container py-4">
    <h2 class="fw-bold mb-3">Apply to be an Instructor</h2>
    <p class="text-muted">Submit your application for moderator review.</p>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Motivation (optional)</label>
                    <textarea class="form-control" name="motivation" rows="6" placeholder="Tell us why you should be approved..."></textarea>
                </div>
                <button class="btn btn-primary" type="submit">Submit application</button>
                <a class="btn btn-outline-secondary" href="{% url 'dashboard' %}">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
